<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smoothies</title>
    <link href="https://fonts.googleapis.com/css2?family=Doto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css"> <!-- External CSS file (optional) -->

    <style>
        /* Basic Styles (You can move this into an external CSS file) */
        body {
            margin: 0;
            font-family: 'Doto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #808080;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 10px 20px;
            background-color: #ffffff;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
        }

        .title {
            margin-left: 20px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .button-container {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        .popup-button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #000000;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .popup-button:hover {
            background-color: #333333;
        }

        .wallet-options {
            display: none;
            position: absolute;
            top: 60px;
            right: 20px;
            background: white;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 8px;
        }

        .wallet-option {
            padding: 10px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px 0;
            border: 1px solid #000000;
        }

        .wallet-option:hover {
            background: #000000;
            color: white;
        }

        .mint-button {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 18px;
            background-color: #000000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="title" id="title">Smoothies</div>
    <div class="button-container">
        <button class="popup-button" id="connectWallet">Connect Wallet</button>
    </div>
</header>

<!-- Wallet options dropdown -->
<div class="wallet-options" id="walletOptions">
    <div class="wallet-option" onclick="connectWallet('Phantom')">Phantom</div>
    <div class="wallet-option" onclick="connectWallet('Solflare')">Solflare</div>
    <div class="wallet-option" onclick="connectWallet('Sollet')">Sollet</div>
</div>

<main>
    <video id="blenderVideo" src="blendooor.mp4"></video>
    <button class="mint-button" id="mintButton">Mint for 0.2 SOL</button>
</main>

<script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.42.0/lib/index.iife.js"></script> <!-- Solana Web3.js CDN -->
<script src="smoothie_script.js"></script> <!-- External JavaScript file -->
</body>
</html>
